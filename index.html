<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bua Loy Num Khing</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- แก้ไขลิงก์ไอคอนเป็นแบบ Raw เพื่อให้แสดงผลได้แม่นยำ -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/aquarius-mars/aquarius-mars.github.io/main/icon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Mali', 'Kanit', sans-serif;
            background-color: #fbf7f0;
            background-image: radial-gradient(#eddcc6 1.8px, transparent 1.8px);
            background-size: 28px 28px;
            user-select: none;
            overflow-x: hidden;
        }

        .wood-border {
            border: 8px solid #8e623b;
            border-radius: 32px;
            background-color: #fffdf9;
            box-shadow: inset 0 0 20px rgba(142, 98, 59, 0.12), 0 12px 0 #5c3c21;
        }

        @media (min-width: 768px) {
            .wood-border {
                border: 10px solid #8e623b;
                border-radius: 36px;
                box-shadow: inset 0 0 25px rgba(142, 98, 59, 0.15), 0 16px 0 #5c3c21;
            }
        }

        .wood-button {
            background: linear-gradient(180deg, #b8865d 0%, #8e623b 100%);
            border-bottom: 6px solid #5c3c21;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wood-button:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .tab-btn {
            background-color: #e9dbba;
            border: 4px solid #8e623b;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -5px 0 rgba(142, 98, 59, 0.08);
            white-space: nowrap;
        }

        .tab-btn.active {
            background-color: #fffdf9;
            padding-bottom: 12px;
            transform: translateY(-4px);
            z-index: 10;
        }

        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        .cozy-slider {
            -webkit-appearance: none;
            width: 100%; height: 12px; border-radius: 9999px; background: #e9dbba;
            outline: none; border: 2px solid #8e623b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-12">

    <header class="w-full max-w-6xl mx-auto px-4 mt-6 md:mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3 md:gap-4 text-center sm:text-left flex-col sm:flex-row">
            <div class="bg-[#8e623b] p-3 md:p-4 rounded-full shadow-lg border-4 border-white animate-bounce">
                <i class="fa-solid fa-frog text-white text-3xl md:text-4xl"></i>
            </div>
            <div>
                <h1 class="text-2xl md:text-4xl font-extrabold text-[#5c3c21] tracking-wide" style="text-shadow: 2px 2px 0px #fff;">
                    Bua Loy Num Khing
                </h1>
                <p class="text-[#8e623b] font-bold text-xs md:text-sm">Bua Loy & Num Khing Inventory Adventure</p>
            </div>
        </div>
        <button onclick="toggleAudioMute()" id="global-mute-btn" class="bg-[#fffdf9] px-4 py-3 rounded-full border-4 border-[#8e623b] text-[#8e623b] font-extrabold shadow-md">
            <i id="global-mute-icon" class="fa-solid fa-volume-xmark"></i> <span id="global-mute-text">Music Off</span>
        </button>
    </header>

    <main class="w-full max-w-6xl mx-auto px-4 mt-8 flex-grow">
        <!-- Stage Container (Simplified for structure) -->
        <div class="wood-border p-8 min-h-[500px]">
            <h2 class="text-2xl font-bold text-[#5c3c21]">Welcome to the Inventory!</h2>
            <p class="text-[#8e623b]">Use the tabs above to manage your supplies.</p>
        </div>
    </main>

    <script>
        let isGlobalMuted = true;
        const globalAudioContext = new (window.AudioContext || window.webkitAudioContext)();

        function toggleAudioMute() {
            isGlobalMuted = !isGlobalMuted;
            const icon = document.getElementById('global-mute-icon');
            const text = document.getElementById('global-mute-text');
            if (isGlobalMuted) {
                icon.className = 'fa-solid fa-volume-xmark';
                text.innerText = 'Music Off';
            } else {
                icon.className = 'fa-solid fa-volume-high';
                text.innerText = 'Music On';
                if (globalAudioContext.state === 'suspended') globalAudioContext.resume();
            }
        }

        function triggerCozySound(soundType) {
            if (isGlobalMuted || !globalAudioContext) return;
            try {
                if (globalAudioContext.state === 'suspended') globalAudioContext.resume();

                const osc = globalAudioContext.createOscillator();
                const gain = globalAudioContext.createGain();
                osc.connect(gain);
                gain.connect(globalAudioContext.destination);

                if (soundType === 'add') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, globalAudioContext.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1000, globalAudioContext.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.12, globalAudioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, globalAudioContext.currentTime + 0.15);
                } else if (soundType === 'bulk-sub') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, globalAudioContext.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, globalAudioContext.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.15, globalAudioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, globalAudioContext.currentTime + 0.35);
                }
                
                osc.start();
                osc.stop(globalAudioContext.currentTime + 0.35);
            } catch (e) {
                console.log("Audio trigger error:", e);
            }
        }
    </script>
</body>
</html>
